# Porta do servidor (deixa em 8080)
server.port=8080

# A tua chave da API da Anthropic
# Vai buscar à variável de ambiente ANTHROPIC_API_KEY
# No Codespaces: vai a Settings > Codespaces > Secrets e adiciona ANTHROPIC_API_KEY
anthropic.api.key=${ANTHROPIC_API_KEY}
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.model=claude-sonnet-4-20250514

# Permite que o React (porta 5173) fale com o Spring Boot (porta 8080)
# Sem isto o browser bloquearia os pedidos
cors.allowed.origin=http://localhost:5173
